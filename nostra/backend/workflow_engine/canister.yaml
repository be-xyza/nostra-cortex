# yaml-language-server: $schema=https://raw.githubusercontent.com/dfinity/icp-cli/main/docs/schemas/canister-yaml-schema.json

name: workflow_engine
build:
  steps:
    - type: script
      command: target_dir="$(cargo metadata --no-deps --format-version 1 --locked | grep -o '"target_directory":"[^"]*"' | cut -d'"' -f4)" && cargo build --target wasm32-unknown-unknown --release --locked && cp "$target_dir/wasm32-unknown-unknown/release/nostra_workflow_engine.wasm" "$ICP_WASM_OUTPUT_PATH"
