version = 1
updated_at = "2026-04-08"
owner = "Systems Steward"
description = "Canonical repo-local workflow registry for Nostra/Cortex development surfaces."

[[source]]
id = "repo_commons"
type = "local_dir"
base_path = "nostra/commons/workflows"

[[ide]]
id = "codex"
install_root = ".codex/workflows"
managed_by_registry = true

[[ide]]
id = "claude"
install_root = ".claude/workflows"
managed_by_registry = true

[[workflow]]
id = "developer-runtime-handoff"
version = "1.0.0"
source_id = "repo_commons"
source_rel_path = "developer-runtime-handoff"
targets = ["codex", "claude"]

