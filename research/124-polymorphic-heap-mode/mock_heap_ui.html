<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Heap: Premium Validation Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cortex: {
                            950: '#070B14',
                            900: '#0B1221',
                            800: '#15213A',
                            700: '#233454',
                            600: '#344A73',
                            500: '#4A6596',
                            accent: '#3B82F6'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #070B14;
            color: #F8FAFC;
            overflow: hidden;
        }

        /* Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #233454;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #344A73;
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(11, 18, 33, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .block-card {
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .block-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.5);
            border-color: #233454;
        }

        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
            align-items: start;
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        /* Detail modal overlay */
        .modal-backdrop {
            background: rgba(7, 11, 20, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal-content {
            animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(12px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Rich text styles */
        .rich-text strong {
            color: #e2e8f0;
            font-weight: 600;
        }

        .rich-text em {
            color: #cbd5e1;
            font-style: italic;
        }

        .rich-text code {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 1px 5px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }
    </style>
</head>

<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Mock Data simulating the EMIT_HEAP_BLOCK schema ---
        const initialBlocks = [
            {
                id: "block_01JHGXYZ1",
                block: {
                    type: "scorecard",
                    title: "System Integrity Quality: Invariant Engine",
                    icon: "shield-alert",
                    color: "red",
                    attributes: { component: "cortex-runtime", rule_layer: "structural" },
                    behaviors: ["pinned", "urgent"]
                },
                content: {
                    payload_type: "a2ui",
                    tree: {
                        widget: "SiqScorecard",
                        passing: false,
                        score: 60,
                        violations: [
                            { node: "NativeEvaluator", error: "Missing InvariantEnginePort Trait" },
                            { node: "GraphProjection", error: "Unsafe mutable borrow detected" }
                        ]
                    }
                },
                relations: { tags: ["security", "audit", "cortex-domain"], mentions: ["block_01JHGXYZ2"] },
                meta: { emitted_at: "2026-02-25T14:15:00Z" }
            },
            {
                id: "block_01JHGXYZ2",
                block: {
                    type: "note",
                    title: "Agui Heap Mode Architecture",
                    icon: "align-left",
                    color: "blue",
                    attributes: { author: "Antigravity", status: "published", workspace: "research" },
                    behaviors: []
                },
                content: {
                    payload_type: "rich_text",
                    text: "The **Polymorphic Block** methodology unifies A2UI outputs, notes, and media into a single CRDT-backed stream. \n\nBy attaching `attributes` and `behaviors`, we enable native UI substrate routing without parsing the inner HTML or JSON. This perfectly aligns with the MVK constraints of Nostra."
                },
                relations: { tags: ["architecture", "research"], mentions: [] },
                meta: { emitted_at: "2026-02-24T09:30:00Z" }
            },
            {
                id: "block_01JHGXYZ3",
                block: {
                    type: "media",
                    title: "Architecture Whiteboard Sync",
                    icon: "image",
                    color: "purple",
                    attributes: { resolution: "1920x1080", size: "2.4MB", uploader: "User" },
                    behaviors: ["collapsed"]
                },
                content: {
                    payload_type: "media",
                    media: {
                        hash: "sha256:8f43434...",
                        mime_type: "image/jpeg",
                        url: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=800&auto=format&fit=crop"
                    }
                },
                relations: { tags: ["diagram", "meeting-notes"], mentions: ["block_01JHGXYZ2"] },
                meta: { emitted_at: "2026-02-23T11:20:00Z" }
            },
            {
                id: "block_01JHGXYZ4",
                block: {
                    type: "task",
                    title: "Implement SIQ Formatter",
                    icon: "check-circle",
                    color: "green",
                    attributes: { priority: "P0", component: "ux/siq_formatter.rs" },
                    behaviors: ["completed", "read-only"]
                },
                content: {
                    payload_type: "structured_data",
                    data: { status: "done", time_spent: "45m", pr_link: "#124" }
                },
                relations: { tags: ["engineering"], mentions: ["block_01JHGXYZ1"] },
                meta: { emitted_at: "2026-02-25T12:00:00Z" }
            }
        ];

        // --- Components ---

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); });
            return <i data-lucide={name} className={className}></i>;
        };

        const Badge = ({ children, color = "slate", outline = false, mono = false }) => {
            const base = `text-[10px] font-semibold px-1.5 py-0.5 rounded uppercase tracking-wider ${mono ? 'font-mono' : ''}`;
            const theme = outline
                ? `border border-${color}-500/30 text-${color}-400 bg-${color}-500/10`
                : `bg-${color}-500/20 text-${color}-300`;
            return <span className={`${base} ${theme}`}>{children}</span>;
        };

        // Markdown-lite parser: handles **bold**, *italic*, `code`, and newlines
        const renderMarkdown = (text) => {
            if (!text) return '';
            let html = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br />');
            return html;
        };

        // Renderers for different Payload Types
        const PayloadRenderer = ({ content, expanded = false }) => {
            switch (content.payload_type) {
                case 'a2ui':
                    if (content.tree.widget === 'SiqScorecard') {
                        return (
                            <div className="bg-red-950/30 border border-red-900/50 rounded-lg p-3 mt-2">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="text-red-400 font-bold text-lg">{content.tree.score}/100</span>
                                    <span className="text-xs text-red-500 uppercase font-semibold">Failing</span>
                                </div>
                                <div className="w-full bg-slate-800 rounded-full h-1.5 mb-3">
                                    <div className="bg-red-500 h-1.5 rounded-full" style={{ width: `${content.tree.score}%` }}></div>
                                </div>
                                <ul className="space-y-1">
                                    {content.tree.violations.map((v, i) => (
                                        <li key={i} className="text-xs text-red-300/80 flex gap-2">
                                            <span className="font-mono text-slate-500">[{v.node}]</span> {v.error}
                                        </li>
                                    ))}
                                </ul>
                                <button className="mt-3 w-full bg-red-600/20 hover:bg-red-600/40 text-red-400 text-xs font-semibold py-1.5 rounded border border-red-500/30 transition-colors">
                                    Generate Auto-Fix
                                </button>
                            </div>
                        );
                    }
                    return <div className="p-3 bg-slate-800 rounded border border-slate-700 text-sm text-slate-400">Generic A2UI Widget</div>;

                case 'rich_text':
                    return (
                        <div
                            className={`rich-text text-sm text-slate-300 leading-relaxed font-sans mt-2 ${expanded ? '' : 'line-clamp-6'}`}
                            dangerouslySetInnerHTML={{ __html: renderMarkdown(content.text) }}
                        />
                    );

                case 'media':
                    return (
                        <div className="mt-2 rounded-lg overflow-hidden border border-slate-700 relative group cursor-zoom-in">
                            <img src={content.media.url} alt="Media thumbnail" className="w-full h-32 object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-end p-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <span className="text-xs font-mono text-slate-300">{content.media.hash.substring(0, 16)}...</span>
                            </div>
                        </div>
                    );

                case 'structured_data':
                    return (
                        <div className="mt-2 text-xs font-mono bg-cortex-900 border border-cortex-800 rounded-md p-3 overflow-x-auto">
                            <pre className="text-cortex-accent/80">{JSON.stringify(content.data, null, 2)}</pre>
                        </div>
                    );

                default:
                    return <div className="text-xs text-slate-500">Unknown payload type</div>;
            }
        };

        const App = () => {
            const [blocks, setBlocks] = useState(initialBlocks);
            const [viewMode, setViewMode] = useState('All');
            const [filterTerm, setFilterTerm] = useState('');
            const [selectedBlockId, setSelectedBlockId] = useState(null);
            const [isRegenerating, setIsRegenerating] = useState(false);
            const [expandedBlockId, setExpandedBlockId] = useState(null);
            const expandedBlock = useMemo(() => blocks.find(b => b.id === expandedBlockId), [blocks, expandedBlockId]);

            // App State logic
            const selectedBlock = React.useMemo(() => blocks.find(b => b.id === selectedBlockId), [blocks, selectedBlockId]);

            const filteredBlocks = useMemo(() => {
                return blocks.filter(b => {
                    const searchLower = filterTerm.toLowerCase();
                    const matchesSearch =
                        b.block.title.toLowerCase().includes(searchLower) ||
                        b.relations.tags.some(t => t.toLowerCase().includes(searchLower)) ||
                        b.content.payload_type.includes(searchLower);

                    if (!matchesSearch) return false;

                    if (viewMode === 'Pinned') return b.block.behaviors.includes('pinned');
                    if (viewMode === 'Urgent') return b.block.behaviors.includes('urgent');
                    if (viewMode === 'Unlinked') return b.relations.mentions.length === 0;
                    return true;
                });
            }, [blocks, viewMode, filterTerm]);

            const handleAction = (action) => {
                if (!selectedBlockId) return;

                if (action === 'delete') {
                    setBlocks(blocks.filter(b => b.id !== selectedBlockId));
                    setSelectedBlockId(null);
                } else if (action === 'pin') {
                    setBlocks(blocks.map(b => {
                        if (b.id === selectedBlockId) {
                            const isPinned = b.block.behaviors.includes('pinned');
                            const newBehs = isPinned
                                ? b.block.behaviors.filter(x => x !== 'pinned')
                                : [...b.block.behaviors, 'pinned'];
                            return { ...b, block: { ...b.block, behaviors: newBehs } };
                        }
                        return b;
                    }));
                } else if (action === 'regen') {
                    setIsRegenerating(true);
                    setTimeout(() => {
                        setIsRegenerating(false);
                    }, 1500);
                }
            };

            return (
                <div className="flex h-screen bg-cortex-950 text-slate-200 overflow-hidden font-sans">

                    {/* --- Sidebar (Navigation & Filters) --- */}
                    <aside className="w-64 bg-cortex-900 border-r border-cortex-800 flex flex-col shrink-0 z-10">
                        <div className="p-5 border-b border-cortex-800 flex items-center gap-3">
                            <div className="bg-cortex-accent/20 p-2 rounded-lg">
                                <Icon name="layers" className="w-5 h-5 text-cortex-accent" />
                            </div>
                            <div>
                                <h1 className="font-bold text-sm tracking-wide">Cortex Studio</h1>
                                <p className="text-[10px] text-slate-500 font-mono">Workspace: Research</p>
                            </div>
                        </div>

                        <div className="p-4 flex-1 overflow-y-auto">
                            <div className="mb-6">
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-2">Heap Views</h2>
                                <nav className="space-y-1">
                                    {['All', 'Pinned', 'Urgent', 'Unlinked'].map(v => (
                                        <button
                                            key={v}
                                            onClick={() => setViewMode(v)}
                                            className={`w-full flex items-center justify-between px-3 py-2 rounded-md text-sm font-medium transition-colors ${viewMode === v ? 'bg-cortex-accent/15 text-cortex-accent' : 'text-slate-400 hover:text-slate-200 hover:bg-cortex-800/50'}`}
                                        >
                                            <div className="flex items-center gap-2">
                                                <Icon name={v === 'All' ? 'grid' : v === 'Pinned' ? 'pin' : v === 'Urgent' ? 'alert-circle' : 'link-2-off'} className="w-4 h-4 opacity-70" />
                                                {v}
                                            </div>
                                            <span className="text-[10px] bg-cortex-950 px-1.5 py-0.5 rounded outline outline-1 outline-cortex-800">
                                                {blocks.filter(b => v === 'All' ? true : v === 'Pinned' ? b.block.behaviors.includes('pinned') : v === 'Urgent' ? b.block.behaviors.includes('urgent') : b.relations.mentions.length === 0).length}
                                            </span>
                                        </button>
                                    ))}
                                </nav>
                            </div>

                            <div>
                                <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-2">Compound Filter</h2>
                                <div className="relative">
                                    <Icon name="search" className="w-4 h-4 absolute left-3 top-2.5 text-slate-500" />
                                    <input
                                        type="text"
                                        placeholder="Search tags, payloads..."
                                        className="w-full bg-cortex-950 border border-cortex-700 rounded-md pl-9 pr-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cortex-accent focus:ring-1 focus:ring-cortex-accent transition-all"
                                        value={filterTerm}
                                        onChange={e => setFilterTerm(e.target.value)}
                                    />
                                </div>

                                <div className="mt-4 flex flex-wrap gap-1.5 px-1">
                                    {Array.from(new Set(blocks.flatMap(b => b.relations.tags))).map(tag => (
                                        <button
                                            key={tag}
                                            onClick={() => setFilterTerm(tag)}
                                            className="text-[10px] bg-cortex-800 hover:bg-cortex-700 text-slate-300 px-2 py-1 rounded-full border border-cortex-700 transition-colors"
                                        >
                                            #{tag}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* --- Main Heap Canvas --- */}
                    <main className="flex-1 flex flex-col relative bg-[#0a0f1c]">
                        {/* Header */}
                        <header className="h-16 border-b border-cortex-800 flex items-center justify-between px-6 glass-panel z-10 sticky top-0">
                            <div className="flex items-center gap-3">
                                <h2 className="text-lg font-semibold">{viewMode} Blocks</h2>
                                {filterTerm && (
                                    <Badge color="blue" outline>Filter: {filterTerm}</Badge>
                                )}
                            </div>
                            <button className="bg-cortex-accent hover:bg-blue-600 text-white px-4 py-1.5 rounded-md text-sm font-medium flex items-center gap-2 transition-colors shadow-lg shadow-blue-500/20">
                                <Icon name="zap" className="w-4 h-4" />
                                Agent Emit
                            </button>
                        </header>

                        {/* Block Grid */}
                        <div className="flex-1 overflow-y-auto p-6 relative">
                            <div className="masonry-grid pb-24 animate-fade-in relative">
                                {filteredBlocks.map(b => (
                                    <div
                                        key={b.id}
                                        onClick={() => setSelectedBlockId(b.id)}
                                        onDoubleClick={(e) => { e.stopPropagation(); setExpandedBlockId(b.id); }}
                                        className={`block-card bg-cortex-900 border rounded-xl cursor-pointer overflow-hidden flex flex-col select-none
                                            ${selectedBlockId === b.id ? 'border-cortex-accent ring-1 ring-cortex-accent/50 shadow-lg shadow-blue-900/20' : 'border-cortex-800'}
                                            ${b.block.behaviors.includes('collapsed') ? 'opacity-80' : ''}
                                            ${isRegenerating && selectedBlockId === b.id ? 'shimmer pointer-events-none' : ''}
                                        `}
                                    >
                                        {/* Block Top Bar (Metadata & Behaviors) */}
                                        <div className="p-3 border-b border-cortex-800/50 bg-cortex-900/50 flex justify-between items-start">
                                            <div className="flex flex-col gap-1">
                                                <div className="flex items-center gap-2">
                                                    <Icon name={b.block.icon} className={`w-4 h-4 text-${b.block.color}-400`} />
                                                    <span className={`text-[10px] font-bold uppercase tracking-wider text-${b.block.color}-400`}>
                                                        {b.block.type}
                                                    </span>
                                                </div>
                                                <span className="text-[9px] font-mono text-slate-500">{new Date(b.meta.emitted_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                            </div>
                                            <div className="flex gap-1 flex-wrap justify-end max-w-[50%]">
                                                {b.block.behaviors.map(beh => (
                                                    <Badge key={beh} color={beh === 'urgent' ? 'red' : beh === 'pinned' ? 'yellow' : 'slate'} outline>
                                                        {beh}
                                                    </Badge>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Block Content Canvas */}
                                        <div className="p-4 flex-1">
                                            <h3 className="text-base font-semibold mb-1 text-slate-100">{b.block.title}</h3>

                                            {/* Attributes Grid */}
                                            {b.block.attributes && Object.keys(b.block.attributes).length > 0 && !b.block.behaviors.includes('collapsed') && (
                                                <div className="flex flex-wrap gap-2 mt-3 mb-3">
                                                    {Object.entries(b.block.attributes).map(([k, v]) => (
                                                        <div key={k} className="flex items-center text-[10px] bg-cortex-950 border border-cortex-800 rounded px-1.5 py-0.5">
                                                            <span className="text-slate-500 mr-1">{k}:</span>
                                                            <span className="font-mono text-slate-300">{v}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {/* Dynamic Payload Renderer */}
                                            {!b.block.behaviors.includes('collapsed') && (
                                                <PayloadRenderer content={b.content} />
                                            )}
                                        </div>

                                        {/* Block Graph Relations Footer */}
                                        <div className="p-3 bg-cortex-950/50 border-t border-cortex-800 flex flex-wrap gap-1.5 items-center min-h-[44px]">
                                            {b.content.payload_type && (
                                                <span className="text-[10px] font-mono text-slate-600 mr-auto">
                                                    {b.content.payload_type}
                                                </span>
                                            )}
                                            {b.relations.mentions.map(m => (
                                                <span key={m} className="text-[10px] font-mono bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-1.5 py-0.5 rounded flex items-center gap-1">
                                                    <Icon name="link" className="w-3 h-3" />
                                                    {m.substring(0, 8)}
                                                </span>
                                            ))}
                                            {b.relations.tags.map(t => (
                                                <span key={t} className="text-[10px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">
                                                    #{t}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {filteredBlocks.length === 0 && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-500 animate-fade-in">
                                    <div className="bg-cortex-900 border border-cortex-800 p-6 rounded-full mb-4">
                                        <Icon name="box" className="w-8 h-8 opacity-50" />
                                    </div>
                                    <p className="text-sm">No blocks found in this view.</p>
                                </div>
                            )}
                        </div>

                        {/* --- Floating Agent Action Bar --- */}
                        {selectedBlockId && (
                            <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-50 animate-slide-up">
                                <div className="glass-panel rounded-full shadow-2xl flex items-center p-1 border border-cortex-700/50">
                                    <div className="px-4 py-2 border-r border-cortex-700/50 flex flex-col">
                                        <span className="text-xs font-semibold text-slate-200">1 Block</span>
                                        <span className="text-[9px] font-mono text-slate-500">{selectedBlockId.substring(0, 10)}...</span>
                                    </div>

                                    <div className="flex px-2 space-x-1">
                                        <button onClick={() => handleAction('regen')} className="group flex items-center gap-2 px-3 py-2 rounded-full hover:bg-blue-500/10 text-slate-400 hover:text-blue-400 transition-colors">
                                            <Icon name="sparkles" className="w-4 h-4" />
                                            <span className="text-xs font-medium w-0 overflow-hidden group-hover:w-auto transition-all">Regenerate</span>
                                        </button>
                                        <div className="w-px h-6 bg-cortex-700 my-auto mx-1"></div>
                                        <button className="p-2 rounded-full hover:bg-slate-800 text-slate-400 hover:text-slate-200 transition-colors tooltip flex items-center justify-center" title="Edit Content">
                                            <Icon name="edit-2" className="w-4 h-4" />
                                        </button>
                                        <button className="p-2 rounded-full hover:bg-slate-800 text-slate-400 hover:text-slate-200 transition-colors tooltip flex items-center justify-center" title="Move Space">
                                            <Icon name="move-right" className="w-4 h-4" />
                                        </button>
                                        <button onClick={() => handleAction('pin')} className="p-2 rounded-full hover:bg-yellow-500/10 text-slate-400 hover:text-yellow-400 transition-colors tooltip flex items-center justify-center" title="Toggle Pin">
                                            <Icon name="pin" className="w-4 h-4" />
                                        </button>
                                        <div className="w-px h-6 bg-cortex-700 my-auto mx-1"></div>
                                        <button onClick={() => handleAction('delete')} className="p-2 rounded-full hover:bg-red-500/10 text-slate-400 hover:text-red-400 transition-colors tooltip flex items-center justify-center" title="Delete Block">
                                            <Icon name="trash-2" className="w-4 h-4" />
                                        </button>
                                    </div>

                                    <button
                                        onClick={() => setSelectedBlockId(null)}
                                        className="p-2 ml-1 mr-1 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white transition-colors flex items-center justify-center"
                                    >
                                        <Icon name="x" className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- Full-Screen Detail Modal (double-click) --- */}
                        {expandedBlock && (
                            <div className="fixed inset-0 z-[100] modal-backdrop flex items-center justify-center p-8" onClick={() => setExpandedBlockId(null)}>
                                <div className="modal-content bg-cortex-900 border border-cortex-700 rounded-2xl shadow-2xl max-w-3xl w-full max-h-[85vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                                    {/* Modal Header */}
                                    <div className="p-5 border-b border-cortex-800 flex justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-2">
                                                <Icon name={expandedBlock.block.icon} className={`w-5 h-5 text-${expandedBlock.block.color}-400`} />
                                                <Badge color={expandedBlock.block.color} outline>{expandedBlock.block.type}</Badge>
                                                {expandedBlock.block.behaviors.map(beh => (
                                                    <Badge key={beh} color={beh === 'urgent' ? 'red' : beh === 'pinned' ? 'yellow' : 'slate'} outline>{beh}</Badge>
                                                ))}
                                            </div>
                                            <h2 className="text-xl font-bold text-slate-100">{expandedBlock.block.title}</h2>
                                            <p className="text-xs font-mono text-slate-500 mt-1">{expandedBlock.id} &middot; {new Date(expandedBlock.meta.emitted_at).toLocaleString()}</p>
                                        </div>
                                        <button onClick={() => setExpandedBlockId(null)} className="p-2 rounded-lg hover:bg-cortex-800 text-slate-400 hover:text-white transition-colors">
                                            <Icon name="x" className="w-5 h-5" />
                                        </button>
                                    </div>

                                    {/* Modal Body */}
                                    <div className="flex-1 overflow-y-auto p-6">
                                        {/* Attributes */}
                                        {expandedBlock.block.attributes && Object.keys(expandedBlock.block.attributes).length > 0 && (
                                            <div className="mb-5">
                                                <h3 className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Attributes</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    {Object.entries(expandedBlock.block.attributes).map(([k, v]) => (
                                                        <div key={k} className="flex items-center text-xs bg-cortex-950 border border-cortex-800 rounded-md px-2 py-1">
                                                            <span className="text-slate-500 mr-1.5">{k}:</span>
                                                            <span className="font-mono text-slate-200">{v}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Full Content (expanded=true removes line-clamp) */}
                                        <div className="mb-5">
                                            <h3 className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Content &middot; {expandedBlock.content.payload_type}</h3>
                                            <PayloadRenderer content={expandedBlock.content} expanded={true} />
                                        </div>

                                        {/* Relations */}
                                        <div>
                                            <h3 className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Relations</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {expandedBlock.relations.tags.map(t => (
                                                    <span key={t} className="text-xs bg-slate-800 text-slate-300 px-2 py-1 rounded-full">#{t}</span>
                                                ))}
                                                {expandedBlock.relations.mentions.map(m => (
                                                    <span key={m} className="text-xs font-mono bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-1 rounded-full flex items-center gap-1">
                                                        <Icon name="link" className="w-3 h-3" /> {m}
                                                    </span>
                                                ))}
                                                {expandedBlock.relations.tags.length === 0 && expandedBlock.relations.mentions.length === 0 && (
                                                    <span className="text-xs text-slate-500 italic">No relations.</span>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Modal Footer (Actions) */}
                                    <div className="p-4 border-t border-cortex-800 bg-cortex-950/50 flex gap-2 justify-end">
                                        <button className="px-3 py-1.5 rounded-md text-xs font-medium bg-cortex-800 hover:bg-cortex-700 text-slate-300 transition-colors flex items-center gap-1.5">
                                            <Icon name="edit-2" className="w-3.5 h-3.5" /> Edit
                                        </button>
                                        <button className="px-3 py-1.5 rounded-md text-xs font-medium bg-cortex-800 hover:bg-cortex-700 text-slate-300 transition-colors flex items-center gap-1.5">
                                            <Icon name="move-right" className="w-3.5 h-3.5" /> Move
                                        </button>
                                        <button className="px-3 py-1.5 rounded-md text-xs font-medium bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/30 transition-colors flex items-center gap-1.5">
                                            <Icon name="sparkles" className="w-3.5 h-3.5" /> Regenerate
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- Right Inspector Panel --- */}
                    {selectedBlock && (
                        <aside className="w-80 bg-cortex-900 border-l border-cortex-800 flex flex-col shrink-0 animate-fade-in z-20 shadow-2xl">
                            <div className="p-4 border-b border-cortex-800 flex items-center justify-between">
                                <h2 className="font-semibold text-sm flex items-center gap-2">
                                    <Icon name="codesandbox" className="w-4 h-4 text-cortex-accent" />
                                    Schema Inspector
                                </h2>
                                <button onClick={() => setSelectedBlockId(null)} className="text-slate-500 hover:text-white">
                                    <Icon name="x" className="w-4 h-4" />
                                </button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4">
                                <p className="text-xs text-slate-400 mb-4 leading-relaxed">
                                    This confirms the <code className="text-cortex-accent bg-cortex-accent/10 px-1 rounded">EmitHeapBlock</code> data model cleanly drives the UI substrate layout and graph ontology.
                                </p>
                                <div className="bg-cortex-950 rounded-lg border border-cortex-800 p-3 overflow-x-auto text-[11px] font-mono text-slate-300">
                                    <pre className="whitespace-pre-wrap">{JSON.stringify(selectedBlock, null, 2)}</pre>
                                </div>
                            </div>
                        </aside>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
