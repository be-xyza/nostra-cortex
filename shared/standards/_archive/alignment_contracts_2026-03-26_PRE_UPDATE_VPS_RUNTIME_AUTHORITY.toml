[[rule]]
id = "siq_graph_projection_contract"
description = "SIQ graph projection contract validity and deterministic fingerprinting"
owner = "Research Steward"
severity = "P1"
enabled = true
enforcement_mode = "observe"
source_standard = "shared/standards/siq/siq_graph_projection.schema.json"
command = "python3 scripts/siq_tools.py check-graph-projection"
