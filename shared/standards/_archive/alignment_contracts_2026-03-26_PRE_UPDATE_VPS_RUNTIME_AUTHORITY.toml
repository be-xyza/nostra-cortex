[[rule]]
id = "siq_governance_execution_contract"
description = "SIQ governance/execution gate evidence coverage and contract conformance"
owner = "Systems Steward"
severity = "P0"
enabled = true
enforcement_mode = "softgate"
source_standard = "shared/standards/siq/siq_governance_gate.schema.json"
