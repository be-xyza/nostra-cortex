[[rule]]
id = "core_standards_drift"
description = "Detect hardcoded canister IDs and unguarded shared mutations"
owner = "Systems Steward"
severity = "P2"
enabled = true
enforcement_mode = "observe"
source_standard = "docs/architecture/standards.md"
command = "python3 scripts/check_core_standards_drift.py"
exception_ref = "core_standards_drift_missing"
