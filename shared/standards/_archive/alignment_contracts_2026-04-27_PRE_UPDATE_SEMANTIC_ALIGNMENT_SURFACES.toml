version = 1
updated_at = "2026-04-10"
exceptions_path = "shared/standards/alignment_contract_exceptions.json"

# Alignment contract registry
# - severity: P0 (critical), P1 (high), P2 (monitoring)
# - enforcement_mode:
#   observe  -> advisory only
#   softgate -> block on failed P0
#   hardgate -> block on failed P0/P1

[[rule]]
id = "research_portfolio_consistency"
description = "Research initiative status/index/portfolio invariants"
owner = "Research Steward"
severity = "P0"
enabled = true
enforcement_mode = "softgate"
source_standard = "docs/architecture/standards.md"
command = "bash scripts/run_repo_python.sh scripts/check_research_portfolio_consistency.py"

