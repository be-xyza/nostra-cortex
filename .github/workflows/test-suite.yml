name: Nostra/Cortex Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CORTEX_ROOT: cortex
  CORTEX_LIB_ROOT: cortex/libraries
  CORTEX_DESKTOP_DIR: cortex/apps/cortex-eudaemon
  CORTEX_DESKTOP_MANIFEST: cortex/apps/cortex-eudaemon/Cargo.toml

jobs:
  check-hardcoded-canister-ids:
    name: Check Hardcoded Canister IDs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CI Gate
        run: chmod +x scripts/check_no_hardcoded_canister_ids.sh && ./scripts/check_no_hardcoded_canister_ids.sh
  test-rust:
    name: Rust Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          REQUIRED=(
            "Cargo.toml"
            "$CORTEX_DESKTOP_MANIFEST"
            "nostra/frontend/Cargo.toml"
            "nostra/worker/Cargo.toml"
            "nostra/streaming/Cargo.toml"
          )
          missing=0
          for path in "${REQUIRED[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "MISSING: $path"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "SKIP: Rust test suite prerequisites are not fully tracked in this snapshot"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Rust
        if: steps.preflight.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        if: steps.preflight.outputs.run == 'true'
        uses: arduino/setup-protoc@v3
      - name: Cache Cargo
        if: steps.preflight.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ github.sha }}
      - name: Run worker tests
        if: steps.preflight.outputs.run == 'true'
        run: cargo test -p nostra_cortex_worker
      - name: Run streaming canister tests
        if: steps.preflight.outputs.run == 'true'
        run: cargo test -p nostra_streaming
      - name: Run focused gateway decision-plane tests
        if: steps.preflight.outputs.run == 'true'
        run: cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" system_decision_
      - name: Run Cortex UX runtime/collaboration governance tests
        if: steps.preflight.outputs.run == 'true'
        run: |
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" shared_contract_fixture_drift_requires_approval_metadata
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" cortex_layout_drift_report_schema_is_stable
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" cortex_runtime_sync_endpoints_report_schema
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" artifact_collab_session_open_op_close_roundtrip
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" artifact_collab_batch_ops_state_presence_and_ordering_roundtrip
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" artifact_collab_force_resolve_requires_steward_and_records_governance
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" shared_contract_fixture_declares_phase7_realtime_endpoints
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" shared_contract_fixture_declares_phase7_governance_metadata_fields
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" realtime_feature_flag_defaults_enabled_and_supports_kill_switch
          cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" cortex_runtime_slo_endpoints_return_payloads
      - name: Run shared fixture frontend parity test
        if: steps.preflight.outputs.run == 'true'
        run: cargo test --manifest-path nostra/frontend/Cargo.toml shared_contract_fixture_contains_studio_and_artifacts_capabilities
      - name: Run shared fixture collaboration parity test
        if: steps.preflight.outputs.run == 'true'
        run: |
          cargo test --manifest-path nostra/frontend/Cargo.toml shared_contract_fixture_declares_phase5_collaboration_endpoints
          cargo test --manifest-path nostra/frontend/Cargo.toml shared_contract_fixture_declares_phase7_realtime_collaboration_endpoints
          cargo test --manifest-path nostra/frontend/Cargo.toml shared_contract_fixture_declares_phase7_realtime_governance_metadata
      - name: Upload decision-plane triage artifacts
        if: always() && steps.preflight.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: decision-plane-triage
          path: |
            logs/testing/test_catalog_latest.json
            logs/testing/test_gate_summary_latest.json
            logs/testing/runs/

  test-motoko:
    name: Motoko Canister Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          if [[ -f "nostra/mops.toml" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "SKIP: missing nostra/mops.toml"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dfx
        if: steps.preflight.outputs.run == 'true'
        run: |
          sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
      - name: Install mops
        if: steps.preflight.outputs.run == 'true'
        run: npm install -g ic-mops
      - name: Run motoko tests
        if: steps.preflight.outputs.run == 'true'
        run: |
          cd nostra
          mops test

  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          if [[ -f "Cargo.toml" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "SKIP: missing root Cargo.toml"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Rust
        if: steps.preflight.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - name: Install protoc
        if: steps.preflight.outputs.run == 'true'
        uses: arduino/setup-protoc@v3
      - name: Rustfmt Check
        if: steps.preflight.outputs.run == 'true'
        run: cargo fmt -- --check
      - name: Clippy Lint
        if: steps.preflight.outputs.run == 'true'
        run: cargo clippy -- -D warnings
      - name: Compliance Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "nostra/scripts/verify_compliance.sh" ]]; then
            chmod +x nostra/scripts/verify_compliance.sh
            nostra/scripts/verify_compliance.sh
          else
            echo "SKIP: nostra/scripts/verify_compliance.sh not found"
          fi
      - name: Strict Warning Profile
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_strict_warning_profile.sh" ]]; then
            chmod +x scripts/check_strict_warning_profile.sh
            bash scripts/check_strict_warning_profile.sh --mode blocking
          else
            echo "SKIP: scripts/check_strict_warning_profile.sh not found"
          fi
      - name: CI Warning-Bypass Integrity Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          chmod +x scripts/check_ci_warning_bypass.sh
          bash scripts/check_ci_warning_bypass.sh --strict
      - name: DID Declaration Sync Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_did_declaration_sync.sh" ]]; then
            bash scripts/check_did_declaration_sync.sh
          else
            echo "SKIP: scripts/check_did_declaration_sync.sh not found"
          fi
      - name: No-Panic Decode Guard
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_no_panic_paths.sh" ]]; then
            bash scripts/check_no_panic_paths.sh
          else
            echo "SKIP: scripts/check_no_panic_paths.sh not found"
          fi
      - name: Frontend WASM Target Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "nostra/frontend/Cargo.toml" ]]; then
            cargo check --manifest-path nostra/frontend/Cargo.toml --target wasm32-unknown-unknown
          else
            echo "SKIP: nostra/frontend/Cargo.toml not found"
          fi
      - name: Cortex Domain Purity Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_cortex_domain_purity.sh" ]]; then
            chmod +x scripts/check_cortex_domain_purity.sh
            bash scripts/check_cortex_domain_purity.sh
          else
            echo "SKIP: scripts/check_cortex_domain_purity.sh not found"
          fi
      - name: Initiative Graph Bootstrap Gate
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_initiative_graph_bootstrap.sh" ]]; then
            bash scripts/check_initiative_graph_bootstrap.sh --validate-only
          else
            echo "SKIP: scripts/check_initiative_graph_bootstrap.sh not found"
          fi
      - name: Workspace Merge Integrity Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_workspace_merge_integrity.sh" ]]; then
            chmod +x scripts/check_workspace_merge_integrity.sh
            bash scripts/check_workspace_merge_integrity.sh
          else
            echo "SKIP: scripts/check_workspace_merge_integrity.sh not found"
          fi
      - name: Alignment Contract Target Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_alignment_contract_targets.sh" ]]; then
            chmod +x scripts/check_alignment_contract_targets.sh
            bash scripts/check_alignment_contract_targets.sh
          else
            echo "SKIP: scripts/check_alignment_contract_targets.sh not found"
          fi
      - name: Docs Structure Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_docs_structure.sh" ]]; then
            bash scripts/check_docs_structure.sh
          else
            echo "SKIP: scripts/check_docs_structure.sh not found"
          fi
      - name: Reference Path Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_reference_paths.sh" ]]; then
            bash scripts/check_reference_paths.sh
          else
            echo "SKIP: scripts/check_reference_paths.sh not found"
          fi
      - name: Reference Taxonomy Integrity Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_reference_taxonomy_integrity.py" ]]; then
            python3 scripts/check_reference_taxonomy_integrity.py --strict
          else
            echo "SKIP: scripts/check_reference_taxonomy_integrity.py not found"
          fi
      - name: Reference Metadata V2 Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_reference_metadata_v2.py" ]]; then
            python3 scripts/check_reference_metadata_v2.py --strict
          else
            echo "SKIP: scripts/check_reference_metadata_v2.py not found"
          fi
      - name: Cortex UX Fixture Drift Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_cortex_ux_fixture_drift.py" ]]; then
            python3 scripts/check_cortex_ux_fixture_drift.py
          else
            echo "SKIP: scripts/check_cortex_ux_fixture_drift.py not found"
          fi
      - name: Phase 7 Closeout Task Gate
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_phase7_closeout_tasks.py" ]]; then
            python3 scripts/check_phase7_closeout_tasks.py \
              --tasks research/116-cortex-realtime-ga-trust-hardening/TASKS.json \
              --validation research/116-cortex-realtime-ga-trust-hardening/VALIDATION.md \
              --mode blocking \
              --as-of "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            echo "SKIP: scripts/check_phase7_closeout_tasks.py not found"
          fi
      - name: Active Initiative Template Residue Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_template_residue_active_initiatives.py" ]]; then
            python3 scripts/check_template_residue_active_initiatives.py --strict
          else
            echo "SKIP: scripts/check_template_residue_active_initiatives.py not found"
          fi
      - name: Gate Surface Integrity Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_gate_surface_integrity.sh" ]]; then
            chmod +x scripts/check_gate_surface_integrity.sh
            bash scripts/check_gate_surface_integrity.sh --strict
          else
            echo "SKIP: scripts/check_gate_surface_integrity.sh not found"
          fi
      - name: Workspace Path Hardcoding Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_no_hardcoded_workspace_paths.sh" ]]; then
            chmod +x scripts/check_no_hardcoded_workspace_paths.sh
            bash scripts/check_no_hardcoded_workspace_paths.sh
          else
            echo "SKIP: scripts/check_no_hardcoded_workspace_paths.sh not found"
          fi
      - name: Contract Surface Integrity Check
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ -f "scripts/check_dead_surface_contract_refs.sh" ]]; then
            chmod +x scripts/check_dead_surface_contract_refs.sh
            bash scripts/check_dead_surface_contract_refs.sh
          else
            echo "SKIP: scripts/check_dead_surface_contract_refs.sh not found"
          fi
      - name: Preserve Test Memory
        if: always() && steps.preflight.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/
            benchmarks/results/
            nostra/frontend/playwright-report/

  siq-observe:
    name: SIQ Observe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          REQUIRED=(
            "scripts/run_siq_checks.sh"
            "scripts/check_siq_artifact_consistency.sh"
            "scripts/siq_tools.py"
          )
          missing=0
          for path in "${REQUIRED[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "MISSING: $path"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "SKIP: SIQ prerequisites are unavailable"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run SIQ observe refresh
        if: steps.preflight.outputs.run == 'true'
        run: |
          chmod +x scripts/run_siq_checks.sh scripts/check_siq_artifact_consistency.sh
          bash scripts/run_siq_checks.sh --mode observe
      - name: Validate SIQ artifacts + deterministic replay
        if: steps.preflight.outputs.run == 'true'
        run: |
          bash scripts/check_siq_artifact_consistency.sh --mode observe --check-deterministic
      - name: Upload SIQ artifacts
        if: always() && steps.preflight.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: siq-artifacts-observe
          path: |
            logs/siq/siq_coverage_latest.json
            logs/siq/siq_dependency_closure_latest.json
            logs/siq/siq_gate_summary_latest.json
            logs/siq/graph_projection_latest.json
            logs/siq/runs/

  siq-softgate:
    name: SIQ Softgate Promotion
    runs-on: ubuntu-latest
    needs: [siq-observe]
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          REQUIRED=(
            "scripts/run_siq_checks.sh"
            "scripts/check_siq_artifact_consistency.sh"
            "scripts/check_siq_softgate_promotion.sh"
            "scripts/siq_tools.py"
          )
          missing=0
          for path in "${REQUIRED[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "MISSING: $path"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "SKIP: SIQ softgate prerequisites are unavailable"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Evaluate softgate promotion readiness
        if: steps.preflight.outputs.run == 'true'
        id: promotion
        run: |
          chmod +x scripts/check_siq_softgate_promotion.sh
          bash scripts/check_siq_softgate_promotion.sh --emit-github-output
      - name: Run SIQ softgate when promotion criteria are met
        if: steps.preflight.outputs.run == 'true'
        run: |
          chmod +x scripts/run_siq_checks.sh scripts/check_siq_artifact_consistency.sh
          if [[ "${{ steps.promotion.outputs.promote }}" == "true" ]]; then
            echo "SIQ softgate promotion active (${{ steps.promotion.outputs.reason }})"
            bash scripts/run_siq_checks.sh --mode softgate
            bash scripts/check_siq_artifact_consistency.sh --mode softgate
          else
            echo "SIQ softgate not promoted yet (${{ steps.promotion.outputs.reason }}); keeping observe posture"
          fi
      - name: Upload SIQ artifacts
        if: always() && steps.preflight.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: siq-artifacts-softgate
          path: |
            logs/siq/siq_coverage_latest.json
            logs/siq/siq_dependency_closure_latest.json
            logs/siq/siq_gate_summary_latest.json
            logs/siq/graph_projection_latest.json
            logs/siq/runs/

  test-catalog-consistency:
    name: Test Catalog Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          if [[ -f "scripts/test_catalog_refresh.sh" && -f "scripts/check_test_catalog_consistency.sh" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "SKIP: test catalog scripts unavailable"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Determine catalog check mode
        if: steps.preflight.outputs.run == 'true'
        id: gate-mode
        run: |
          TODAY="$(date -u +%F)"
          if [[ "$TODAY" < "2026-02-23" ]]; then
            echo "mode=advisory" >> "$GITHUB_OUTPUT"
          else
            echo "mode=blocking" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate catalog and gate artifacts
        if: steps.preflight.outputs.run == 'true'
        run: |
          chmod +x scripts/test_catalog_refresh.sh
          if [[ "${{ steps.gate-mode.outputs.mode }}" == "advisory" ]]; then
            bash scripts/test_catalog_refresh.sh --mode advisory --scenario pass --allow-synthetic-latest --environment ci --agent-id github-actions
          else
            bash scripts/test_catalog_refresh.sh --mode blocking --real-run --environment ci --agent-id github-actions
          fi
      - name: Validate test catalog consistency
        if: steps.preflight.outputs.run == 'true'
        run: |
          if [[ "${{ steps.gate-mode.outputs.mode }}" == "advisory" ]]; then
            bash scripts/check_test_catalog_consistency.sh --mode advisory --allow-synthetic-latest
          else
            bash scripts/check_test_catalog_consistency.sh --mode blocking
          fi
      - name: Upload testing artifacts
        if: always() && steps.preflight.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: testing-artifacts
          path: |
            logs/testing/test_catalog_latest.json
            logs/testing/test_gate_summary_latest.json
            logs/testing/runs/

  cortex-runtime-freeze-gates:
    name: Cortex Runtime Freeze Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight (required)
        run: |
          REQUIRED=(
            "cortex/Cargo.toml"
            "$CORTEX_DESKTOP_MANIFEST"
            "scripts/run_cortex_runtime_freeze_gates.sh"
            "scripts/check_gateway_parity_inventory_sync.sh"
            "scripts/check_cortex_domain_purity.sh"
            "scripts/check_cortex_runtime_purity.sh"
            "scripts/check_nostra_cortex_terminology.sh"
            "$CORTEX_DESKTOP_DIR/tests/fixtures/gateway_baseline/endpoint_inventory.tsv"
            "$CORTEX_DESKTOP_DIR/tests/fixtures/gateway_baseline/endpoint_inventory.json"
            "$CORTEX_DESKTOP_DIR/tests/fixtures/gateway_baseline/approved_exemptions.json"
          )
          for path in "${REQUIRED[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "FAIL: missing required freeze-gate asset: $path"
              exit 1
            fi
          done
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run freeze gate suite
        run: |
          chmod +x scripts/run_cortex_runtime_freeze_gates.sh
          chmod +x scripts/check_gateway_parity_inventory_sync.sh
          bash scripts/run_cortex_runtime_freeze_gates.sh
      - name: Upload freeze gate artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-runtime-freeze-gates
          path: |
            logs/testing/freeze_gates/
            ${{ env.CORTEX_DESKTOP_DIR }}/tests/fixtures/gateway_baseline/endpoint_inventory.tsv
            ${{ env.CORTEX_DESKTOP_DIR }}/tests/fixtures/gateway_baseline/endpoint_inventory.json
            ${{ env.CORTEX_DESKTOP_DIR }}/tests/fixtures/gateway_baseline/approved_exemptions.json

  initiative-118-evidence-gate:
    name: Initiative 118 Evidence Gate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Preflight (required)
        run: |
          REQUIRED=(
            "scripts/check_118_pr_evidence.sh"
          )
          for path in "${REQUIRED[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "FAIL: missing required evidence-gate asset: $path"
              exit 1
            fi
          done
      - name: Detect Initiative 118 scope changes
        id: scope
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"

          echo "$CHANGED_FILES" > /tmp/changed_files_118.txt
          echo "pr_context=true" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED_FILES" | grep -Eq "^(${CORTEX_DESKTOP_DIR}/src/services/acp_.*|${CORTEX_DESKTOP_DIR}/tests/gateway_parity\\.rs|${CORTEX_DESKTOP_DIR}/tests/fixtures/gateway_baseline/.*|scripts/check_gateway_parity_inventory_sync\\.sh|scripts/check_gateway_protocol_contract_coverage\\.sh|scripts/check_gateway_contract_descriptors_strict\\.sh|scripts/check_local_gateway_singleton_boundary\\.sh|scripts/check_118_pr_evidence\\.sh|scripts/generate_118_pr_evidence_body\\.sh|scripts/run_cortex_runtime_freeze_gates\\.sh|research/118-cortex-runtime-extraction/.*|research/RESEARCH_INITIATIVES_STATUS\\.md)$"; then
            echo "in_scope=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_scope=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract PR body
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          payload = json.loads(event_path.read_text())
          body = payload.get("pull_request", {}).get("body") or ""
          out = Path(os.environ["RUNNER_TEMP"]) / "pr_body_118.md"
          out.write_text(body)
          print(f"Wrote PR body to {out}")
          PY
      - name: Validate Initiative 118 PR evidence
        run: |
          mkdir -p logs/testing/freeze_gates
          chmod +x scripts/check_118_pr_evidence.sh
          if [[ "${{ steps.scope.outputs.pr_context }}" == "true" && "${{ steps.scope.outputs.in_scope }}" == "true" ]]; then
            REQUIRE=true
          else
            REQUIRE=false
          fi
          bash scripts/check_118_pr_evidence.sh \
            --pr-body-file "$RUNNER_TEMP/pr_body_118.md" \
            --require-freeze-evidence "$REQUIRE" \
            --scope-includes-118 "${{ steps.scope.outputs.in_scope }}" 2>&1 | tee logs/testing/freeze_gates/pr_evidence_check.log
      - name: Upload Initiative 118 evidence log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: initiative-118-evidence-gate
          path: logs/testing/freeze_gates/pr_evidence_check.log

  offline-simulations-playwright:
    name: Offline Simulations Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          REQUIRED=(
            "scripts/check_offline_simulation_playwright.sh"
            "package.json"
            "playwright.config.ts"
          )
          missing=0
          for path in "${REQUIRED[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "MISSING: $path"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "SKIP: offline simulation prerequisites not available"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Rust
        if: steps.preflight.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        if: steps.preflight.outputs.run == 'true'
        uses: arduino/setup-protoc@v3
      - name: Install Dioxus CLI
        if: steps.preflight.outputs.run == 'true'
        run: cargo install dioxus-cli --locked
      - name: Setup Node
        if: steps.preflight.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        if: steps.preflight.outputs.run == 'true'
        run: npm ci
      - name: Install Playwright Chromium
        if: steps.preflight.outputs.run == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run offline simulation Playwright checks
        if: steps.preflight.outputs.run == 'true'
        run: bash scripts/check_offline_simulation_playwright.sh
      - name: Upload offline simulation artifacts
        if: always() && steps.preflight.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: offline-simulation-artifacts
          path: |
            logs/testing/offline_projection_playwright_latest.json
            logs/testing/offline_projection_playwright_report_latest.json
            logs/testing/offline_projection_playwright_server_latest.log
            logs/testing/offline_projection_playwright_stderr_latest.log

  acp-gateway-integration:
    name: ACP Gateway Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        id: preflight
        run: |
          REQUIRED=(
            "$CORTEX_DESKTOP_MANIFEST"
            "$CORTEX_DESKTOP_DIR/tests/acp_gateway_integration.rs"
            "$CORTEX_DESKTOP_DIR/tests/acp_staging_operationalization.rs"
          )
          missing=0
          for path in "${REQUIRED[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "MISSING: $path"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "SKIP: ACP gateway integration prerequisites not available"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Rust
        if: steps.preflight.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        if: steps.preflight.outputs.run == 'true'
        uses: arduino/setup-protoc@v3
      - name: Run ACP gateway integration (ignored suite)
        if: steps.preflight.outputs.run == 'true'
        run: cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" --test acp_gateway_integration -- --ignored
      - name: Run ACP staging operationalization drill (ignored suite)
        if: steps.preflight.outputs.run == 'true'
        run: cargo test --manifest-path "$CORTEX_DESKTOP_MANIFEST" --test acp_staging_operationalization -- --ignored

  deploy:
    name: Deploy to VPS
    needs: [test-rust, test-motoko, lint, siq-observe, siq-softgate, test-catalog-consistency, cortex-runtime-freeze-gates, initiative-118-evidence-gate, offline-simulations-playwright, acp-gateway-integration]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    steps:
      - name: Deploy to Eudaemon Alpha VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /srv/nostra/eudaemon-alpha/repo/ops/hetzner/deploy.sh
